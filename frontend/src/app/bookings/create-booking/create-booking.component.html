<h2>Create Booking</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <div *ngIf="vehicleName"><strong>Vehicle:</strong> {{ vehicleName }}</div>

  <label>Start Date</label>
  <input type="date" formControlName="startDate" />

  <label>End Date</label>
  <input type="date" formControlName="endDate" />

  <label>Note (Optional)</label>
  <textarea formControlName="note"></textarea>

  <p *ngIf="conflictError" style="color: #c62828; font-weight: 600">
    {{ conflictError }}
  </p>

  <button type="button" (click)="startDigitalAgreement()">
    Complete Digital Agreement
  </button>

  <button type="submit" [disabled]="loading">
    {{ loading ? "Booking..." : "Book Vehicle" }}
  </button>
</form>
