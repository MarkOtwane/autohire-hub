<section class="unauthorized-page">
  <div class="panel">
    <p class="eyebrow">Permission Required</p>
    <h1>Access denied</h1>
    <p>
      Your account does not have permission to open this page. If this seems
      wrong, contact an administrator.
    </p>

    <div class="actions">
      <button type="button" class="btn btn-primary" (click)="goToLogin()">
        Go to Login
      </button>
      <button type="button" class="btn btn-ghost" (click)="goHome()">
        Back to Home
      </button>
    </div>
  </div>
</section>
