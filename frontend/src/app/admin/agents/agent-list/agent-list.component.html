<div class="agent-list">
  <div class="header">
    <h2>Manage Agents</h2>
    <button routerLink="/admin/agents/create" class="create-btn">Add Agent</button>
  </div>

  <div *ngIf="loading" class="loading">Loading agents...</div>

  <table *ngIf="!loading && agents.length > 0" class="agents-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let agent of agents">
        <td>{{ agent.id }}</td>
        <td>{{ agent.name }}</td>
        <td>{{ agent.email }}</td>
        <td>{{ agent.phone }}</td>
        <td>
          <span class="status-badge" [class]="'status-' + agent.status.toLowerCase()">
            {{ agent.status }}
          </span>
        </td>
        <td class="actions">
          <button (click)="editAgent(agent.id)" class="btn-edit">Edit</button>
          <button *ngIf="agent.status !== 'APPROVED'" (click)="approve(agent.id)" class="btn-approve">
            Approve
          </button>
          <button *ngIf="agent.status !== 'SUSPENDED'" (click)="suspend(agent.id)" class="btn-suspend">
            Suspend
          </button>
          <button (click)="deleteAgent(agent.id)" class="btn-delete">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && agents.length === 0" class="empty-state">
    <p>No agents found.</p>
    <button routerLink="/admin/agents/create" class="create-btn">Add First Agent</button>
  </div>
</div>
